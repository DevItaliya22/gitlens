<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitLens Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canvas: {
                default: "#0d1117",
                subtle: "#161b22",
                overlay: "#21262d",
              },
              border: {
                default: "#30363d",
                muted: "#21262d",
              },
              fg: {
                default: "#c9d1d9",
                muted: "#8b949e",
              },
              diff: {
                add: "rgba(46, 160, 67, 0.15)",
                addText: "#3fb950",
                del: "rgba(248, 81, 73, 0.15)",
                delText: "#f85149",
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0d1117;
        color: #c9d1d9;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0d1117;
      }
      ::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #8b949e;
      }

      /* PrismJS Custom Overrides for GitHub Dark feel */
      code[class*="language-"],
      pre[class*="language-"] {
        color: #c9d1d9;
        text-shadow: none;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        text-align: left;
        white-space: pre;
        word-spacing: normal;
        word-break: normal;
        word-wrap: normal;
        line-height: 1.5;
        background: none;
      }
    </style>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
      rel="stylesheet"
    />
    <script type="importmap">
      {
        "imports": {
          "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
          "date-fns": "https://aistudiocdn.com/date-fns@^4.1.0",
          "prismjs": "https://aistudiocdn.com/prismjs@^1.29.0"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
